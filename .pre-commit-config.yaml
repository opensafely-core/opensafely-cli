default_language_version:
  python: python3.10

exclude: opensafely/_vendor/
repos:
  - repo: local
    hooks:
    - id: black
      name: black
      entry: just black
      language: system
      types: [python]
      require_serial: true
    - id: ruff
      name: ruff
      entry: just ruff
      language: system
      types: [python]
      require_serial: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c # v6.0.0
    hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: debug-statements
    - id: check-ast
    - id: check-json
    - id: check-toml
    - id: check-yaml
    - id: detect-private-key
